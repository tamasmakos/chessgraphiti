name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Determine baseline
        id: baseline
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "since=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "since=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Changed-file quality
        run: pnpm exec biome ci --changed --since="${{ steps.baseline.outputs.since }}" --files-ignore-unknown=true --css-parse-tailwind-directives=true --no-errors-on-unmatched .

      - name: Typecheck backlog
        continue-on-error: true
        run: pnpm typecheck

      - name: Test backlog
        continue-on-error: true
        run: pnpm test
